<div class="container py-5">
  <h1 class="display-4 mb-4">{{ 'notifications_page.title' | translate }}</h1>
  <p class="lead mb-5">{{ 'notifications_page.subtitle' | translate }}</p>

  <!-- Notifications Panel (Dashboard Widget) -->
  <section class="demo-section">
    <h2>Notifications Panel (Dashboard Widget)</h2>
    <div class="card" style="max-width: 420px;">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-bell-fill text-primary fs-5"></i>
            <h5 class="mb-0">Notifications</h5>
            <span class="badge bg-primary rounded-pill">4</span>
          </div>
          <a href="#" class="btn btn-link btn-sm text-decoration-none small">View All</a>
        </div>
        <div class="d-flex flex-column gap-2">
          <!-- Unread -->
          <button type="button" class="btn p-0 border-0 text-start w-100">
            <div class="d-flex align-items-start gap-3 p-2 rounded bg-primary-subtle border border-primary-subtle">
              <div class="d-flex align-items-center justify-content-center rounded-circle bg-primary text-white flex-shrink-0" style="width: 36px; height: 36px;">
                <i class="bi bi-bell-fill small"></i>
              </div>
              <div class="flex-grow-1 overflow-hidden">
                <div class="d-flex justify-content-between gap-2">
                  <span class="fw-semibold small text-dark">License renewal reminder</span>
                  <small class="text-muted text-nowrap">2h ago</small>
                </div>
                <p class="text-muted small mb-0 text-truncate">Your license expires in 30 days. Renew now to avoid service interruption.</p>
              </div>
            </div>
          </button>
          <!-- Unread -->
          <button type="button" class="btn p-0 border-0 text-start w-100">
            <div class="d-flex align-items-start gap-3 p-2 rounded bg-primary-subtle border border-primary-subtle">
              <div class="d-flex align-items-center justify-content-center rounded-circle bg-primary text-white flex-shrink-0" style="width: 36px; height: 36px;">
                <i class="bi bi-bell-fill small"></i>
              </div>
              <div class="flex-grow-1 overflow-hidden">
                <div class="d-flex justify-content-between gap-2">
                  <span class="fw-semibold small text-dark">Inspection scheduled</span>
                  <small class="text-muted text-nowrap">1d ago</small>
                </div>
                <p class="text-muted small mb-0 text-truncate">Your facility inspection is scheduled for 25 Jun 2025.</p>
              </div>
            </div>
          </button>
          <!-- Read -->
          <button type="button" class="btn p-0 border-0 text-start w-100">
            <div class="d-flex align-items-start gap-3 p-2 rounded border">
              <div class="d-flex align-items-center justify-content-center rounded-circle bg-light text-muted flex-shrink-0" style="width: 36px; height: 36px;">
                <i class="bi bi-bell small"></i>
              </div>
              <div class="flex-grow-1 overflow-hidden">
                <div class="d-flex justify-content-between gap-2">
                  <span class="small text-dark">Certificate ready for download</span>
                  <small class="text-muted text-nowrap">3d ago</small>
                </div>
                <p class="text-muted small mb-0 text-truncate">Your conformity certificate has been issued.</p>
              </div>
            </div>
          </button>
        </div>
      </div>
    </div>
    <app-code-example [htmlCode]="notificationPanelCode"></app-code-example>
  </section>

  <!-- Full Notifications List (Page) -->
  <section class="demo-section">
    <h2>Full Notifications Page</h2>
    <div style="max-width: 680px;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">All Notifications</h5>
        <button type="button" class="btn btn-link btn-sm text-decoration-none p-0">Mark all as read</button>
      </div>
      <div class="list-group">
        <!-- Unread #1 -->
        <button type="button" class="list-group-item list-group-item-action">
          <div class="d-flex w-100 align-items-start gap-3">
            <div class="d-flex align-items-center justify-content-center rounded-circle bg-primary-subtle text-primary flex-shrink-0 mt-1" style="width: 40px; height: 40px;">
              <i class="bi bi-bell-fill"></i>
            </div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div class="d-flex align-items-center gap-2">
                  <i class="bi bi-circle-fill text-primary" style="font-size: 0.5rem;"></i>
                  <h6 class="mb-0 small fw-bold">License renewal reminder</h6>
                </div>
                <small class="text-muted text-nowrap">2 hours ago</small>
              </div>
              <p class="small text-muted mb-1 mt-1">Your license expires in 30 days. Renew now to avoid service interruption.</p>
            </div>
          </div>
        </button>
        <!-- Unread #2 -->
        <button type="button" class="list-group-item list-group-item-action">
          <div class="d-flex w-100 align-items-start gap-3">
            <div class="d-flex align-items-center justify-content-center rounded-circle bg-warning-subtle text-warning flex-shrink-0 mt-1" style="width: 40px; height: 40px;">
              <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div class="d-flex align-items-center gap-2">
                  <i class="bi bi-circle-fill text-primary" style="font-size: 0.5rem;"></i>
                  <h6 class="mb-0 small fw-bold">Missing documents</h6>
                </div>
                <small class="text-muted text-nowrap">1 day ago</small>
              </div>
              <p class="small text-muted mb-1 mt-1">Application #APP-2024-5566 is missing technical documentation. Please upload to proceed.</p>
            </div>
          </div>
        </button>
        <!-- Read #1 -->
        <button type="button" class="list-group-item list-group-item-action">
          <div class="d-flex w-100 align-items-start gap-3">
            <div class="d-flex align-items-center justify-content-center rounded-circle bg-success-subtle text-success flex-shrink-0 mt-1" style="width: 40px; height: 40px;">
              <i class="bi bi-check-circle-fill"></i>
            </div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <h6 class="mb-0 small fw-normal text-muted">Certificate ready for download</h6>
                <small class="text-muted text-nowrap">3 days ago</small>
              </div>
              <p class="small text-muted mb-0 mt-1">Your conformity certificate for batch #B-2024-789 has been issued.</p>
            </div>
          </div>
        </button>
        <!-- Read #2 -->
        <button type="button" class="list-group-item list-group-item-action">
          <div class="d-flex w-100 align-items-start gap-3">
            <div class="d-flex align-items-center justify-content-center rounded-circle bg-info-subtle text-info flex-shrink-0 mt-1" style="width: 40px; height: 40px;">
              <i class="bi bi-calendar-check"></i>
            </div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <h6 class="mb-0 small fw-normal text-muted">Inspection scheduled</h6>
                <small class="text-muted text-nowrap">5 days ago</small>
              </div>
              <p class="small text-muted mb-0 mt-1">Your facility inspection is scheduled for 25 Jun 2025 at 10:00 AM.</p>
            </div>
          </div>
        </button>
        <!-- Empty state example (commented out by default) -->
      </div>
      <div class="text-center mt-4">
        <button class="btn btn-link text-decoration-none">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Load more
        </button>
      </div>
    </div>
    <app-code-example [htmlCode]="notificationListCode"></app-code-example>
  </section>

  <!-- Empty State -->
  <section class="demo-section">
    <h2>Empty State</h2>
    <div class="card" style="max-width: 420px;">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-bell text-primary fs-5"></i>
            <h5 class="mb-0">Notifications</h5>
          </div>
        </div>
        <div class="notification-empty text-center text-muted py-5">
          <i class="bi bi-bell-slash fs-2 mb-2 d-block"></i>
          <p class="mb-0">No notifications yet</p>
          <small>You'll see important updates here</small>
        </div>
      </div>
    </div>
  </section>
</div>
